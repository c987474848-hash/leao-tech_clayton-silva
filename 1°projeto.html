<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aula04</title>
</head>

<body>
    <h1>formulario de candidatura</h1>
        <form>
            <label for="nome" input type="nome" name="nome" id="nome">nome:</label>
            <input type="text" name="nome" id="nome" placeholder="Escreva seu nome"> <br> <br>

            <label for="email" input type="email" name="email" id="email">email:</label>
            <input type="text" name="email" id="email" placeholder="Escreva seu email">


            <label for="cpf" input type="cpf"name="cpf" id="cpf">cpf:</label>
            <input type="text" name="cpf" id="cpf" placeholder="Escreva seu cpf">
            <br><br>
            <label for="cargo">cargo tecnologia</label>
            <select name="cargo" id="cargo">
                <option value="">--selecione--</option>
                <option value="dev">desenvolvedor</option>
                <option value="analista">analista</option>
                <option value="qa">qualidade</option>
            </select>

            <br><br>
            <label for="">genero</label>

            <input type="radio" value="m" id="m"
            name="genero">
            <label for="m">masculino</label>

            <input type="radio" value="f" id="f" name="genero">
            <label for="f">feminino</label>

            <input type="radio" value="o" id="o" name="genero">
            <label for="o">outro</label>

            <br><br>
            <label for="">unidade de interesse</label>
            <input type="checkbox"name="unidade"
            name="unidade" id="fortaleza">
            <label for="fortaleza">fortaleza</label>

            <input type="checkbox"name="unidade"
            name="unidade" id="caucaia">
            <label for="caucaia">caucaia</label>

            <input type="checkbox"name="unidade"
            name="unidade" id="maracanaú">
            <label for="maracanaú">maracanaú</label>
            
            <input type="checkbox"name="unidade"
            name="unidade" id="juazeiro">
            <label for="juazeiro">juazeiro</label>

            <br><br>
            <label for="comentario"></label>fale mais sobre voce</label>
            <br>

            <textarea cols="50" rows="5" id="comentario"></textarea>

            <br><br>
            <input type="submit" value="enviar">











        </form>





</body>

</html>
